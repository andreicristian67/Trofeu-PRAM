<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trofeu PRAM</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root { --dark: #2c3e50; --blue: #3498db; --green: #27ae60; --red: #e74c3c; --orange: #f39c12; --gray: #ecf0f1; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; padding: 5px; display: flex; flex-direction: column; align-items: center; }
        
        .nav-container { width: 100%; max-width: 800px; background: var(--dark); padding: 5px; border-radius: 8px; margin-bottom: 10px; }
        .nav-grid { display: grid; grid-template-columns: repeat(15, 1fr); gap: 3px; }
        .nav-item { padding: 4px 0; text-align: center; background: rgba(255,255,255,0.2); color: white; border-radius: 3px; cursor: pointer; font-size: 10px; font-weight: bold; }
        .nav-item.active { background: var(--orange) !important; outline: 1px solid white; }
        .nav-item.correct { background: var(--green) !important; }
        .nav-item.wrong { background: var(--red) !important; }

        .quiz-card { background: white; width: 100%; max-width: 800px; padding: 15px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); box-sizing: border-box; }
        .stats-header { display: flex; justify-content: space-between; font-weight: bold; font-size: 13px; margin-bottom: 10px; color: var(--dark); border-bottom: 1px solid #eee; padding-bottom: 8px; align-items: center; }
        
        .q-text { font-size: 17px; font-weight: 600; margin-bottom: 15px; line-height: 1.3; }
        .options-container { display: flex; flex-direction: column; gap: 8px; margin-bottom: 15px; }
        .opt-btn { display: flex; align-items: center; padding: 10px; border: 1px solid #ddd; border-radius: 6px; cursor: pointer; background: white; font-size: 14px; transition: 0.2s; }
        .opt-btn.selected { border-color: var(--blue); background: #ebf5fb; }
        
        .controls { display: flex; gap: 8px; }
        button { flex: 1; padding: 12px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 15px; color: white; transition: 0.2s; }
        .btn-prev { background: #95a5a6; }
        .btn-action { background: var(--green); }

        .start-btn-group { display: flex; flex-direction: column; gap: 10px; width: 100%; max-width: 300px; margin-top: 15px; }
        .btn-recap { background: var(--orange); display: none; }

        .report-btn { background: none; border: 1px solid var(--red); color: var(--red); padding: 5px 10px; border-radius: 4px; font-size: 11px; cursor: pointer; transition: 0.2s; font-weight: bold; display: flex; align-items: center; gap: 4px;}
        .report-btn:hover { background: var(--red); color: white; }
        .report-btn:disabled { border-color: var(--green); color: var(--green); background: #ebf5eb; cursor: default; }

        #startScreen, #resultScreen { position: fixed; inset: 0; background: white; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; overflow-y: auto;}
        
        .history-panel { width: 100%; max-width: 800px; margin-top: 15px; background: white; padding: 15px; border-radius: 8px; font-size: 13px; }
        #errorLog { color: red; font-size: 14px; margin-bottom: 15px; font-weight: bold; }

        #historyList {
            display: flex;
            flex-direction: column;
            flex-wrap: wrap;
            max-height: 250px; 
            gap: 4px 40px; 
            margin-top: 10px;
            align-content: flex-start;
        }
        .history-item {
            width: 100px; 
            display: flex; 
            justify-content: space-between; 
            font-size: 13px; 
            font-weight: normal; 
        }

        /* Stiluri MODUL STUDIU (Scroll Continuu) */
        #studyScreen { position: fixed; inset: 0; background: #f4f7f6; z-index: 200; display: none; flex-direction: column; padding: 15px; overflow-y: auto; scroll-behavior: smooth; }
        .study-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; background: var(--dark); color: white; padding: 15px; border-radius: 8px; flex-shrink: 0; }
        .close-study { background: var(--red); padding: 8px 15px; border-radius: 6px; font-size: 14px; cursor: pointer; border: none; color: white; font-weight: bold; }
        
        .study-content-area { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); flex-grow: 1; }
        .study-nav-scroll { display: flex; gap: 10px; margin-bottom: 25px; overflow-x: auto; padding-bottom: 10px; position: sticky; top: -20px; background: white; padding-top: 20px; z-index: 10; border-bottom: 2px solid #eee; }
        .nav-anchor { background: #bdc3c7; color: var(--dark); padding: 10px 20px; border-radius: 20px; font-size: 14px; text-decoration: none; font-weight: bold; transition: 0.2s; white-space: nowrap; }
        .nav-anchor:hover { background: var(--blue); color: white; }
        
        .eq-section { margin-bottom: 50px; padding-bottom: 20px; }
        .eq-title { background: var(--dark); color: white; padding: 12px; border-radius: 6px; margin-top: 0; }
        
        .study-grid { display: grid; grid-template-columns: 1fr; gap: 15px; margin-bottom: 30px; }
        .study-card { border-left: 4px solid var(--blue); padding: 12px 15px; background: #f9f9f9; border-radius: 4px; }
        .defect-card { border-left-color: var(--red); background: #fdf3f2; }
        .study-card hr { border: none; border-top: 1px dashed #ccc; margin: 8px 0; }
    </style>
</head>
<body>

<div id="startScreen">
    <h1>📝 Examen PRAM</h1>
    <p>45 Întrebări | 150 Puncte</p>
    <div id="loadStatus" style="margin-bottom:10px; color: var(--orange); font-weight: bold;">Se descarcă baza de date...</div>
    <div id="errorLog"></div>
    
    <div class="start-btn-group">
        <button id="startBtn" disabled onclick="initExam()" style="background:#ccc; padding: 15px; font-size:16px; border-radius: 10px; cursor:not-allowed;">START EXAMEN</button>
        <button id="recapBtn" class="btn-recap" onclick="initRecap()" style="padding: 15px; font-size:14px; border-radius: 10px;">🔄 RECAPITULARE</button>
        <button id="studyBtn" onclick="openStudy()" style="padding: 15px; font-size:14px; border-radius: 10px; background: var(--blue); display: none;">📖 MODUL STUDIU</button>
    </div>
</div>

<div class="nav-container">
    <div class="nav-grid" id="navGrid"></div>
</div>

<div class="quiz-card" id="quizCard">
    <div class="stats-header">
        <span id="scoreDisplay">SCOR: 0</span>
        <div style="display: flex; gap: 10px; align-items: center;">
            <span id="qMeta" style="color:var(--blue)">-</span>
            <button id="reportBtn" class="report-btn" onclick="trimiteRaport()">🚩 RAPORTARE</button>
        </div>
    </div>
    <div id="qText" class="q-text">Alege un ID sau pornește examenul...</div>
    <div class="options-container" id="optionsArea"></div>
    
    <div class="controls">
        <button class="btn-prev" onclick="move(-1)">ÎNAPOI</button>
        <button class="btn-action" id="mainBtn" onclick="handleAction()">VERIFICĂ</button>
    </div>
</div>

<div class="history-panel">
    <strong style="display:block; margin-bottom: 8px;">📜 Istoric Scoruri:</strong>
    <div id="historyList"></div>
</div>

<div id="resultScreen" style="display:none">
    <h1 id="verdictText">REZULTAT</h1>
    <div style="font-size: 50px; font-weight: bold; color: var(--blue);" id="finalScoreText">0</div>
    <button onclick="location.reload()" style="background:var(--dark); padding: 10px 30px;">REIA TESTUL</button>
</div>

<div id="studyScreen">
    <div class="study-header">
        <h2 style="margin: 0; font-size: 18px;">📖 Modul de Studiu & Echipamente</h2>
        <button class="close-study" onclick="closeStudy()">❌ ÎNCHIDE</button>
    </div>
    <div class="study-content-area" id="studyContent">Se încarcă datele...</div>
</div>

<script>
    let db = [];
    let exam = [], currentIdx = 0, currentScore = 0;
    let answers = {}, results = {}, isPaused = false; 
    let wrongIDs = JSON.parse(localStorage.getItem('pram_wrongIDs') || "[]"); 
    let isRecapMode = false;
    let maxExamScore = 150;
    let studyData = {}; // Variabila pentru modul de studiu

    window.onload = function() {
        // Incarcam baza de date principala pentru Examene
        Papa.parse("baza_date.csv?v=" + new Date().getTime(), {
            download: true,
            header: false,
            skipEmptyLines: true,
            delimiter: ";", 
            complete: function(r) {
                let rows = r.data;
                for(let i=1; i < rows.length; i++) {
                    let parts = rows[i].filter(p => p !== null && p !== undefined && p.trim() !== '');
                    if(parts.length < 5) continue; 
                    
                    let punctaj = parts[parts.length - 1];
                    let categorie = parts[parts.length - 2];
                    let raspuns = parts[parts.length - 3];
                    let id = parts[0];
                    let intrebare = parts[1];
                    let options = parts.slice(2, parts.length - 3);
                    
                    let q = {
                        ID: id,
                        cleanId: parseInt(id.replace(/\D/g, '')) || 0,
                        Intrebare: intrebare,
                        Var_A: options[0] || "-",
                        Var_B: options[1] || "-",
                        Var_C: options[2] || "-",
                        Var_D: options[3] || "-",
                        Var_E: options.slice(4).join("; ") || "-",
                        Raspuns_Corect: raspuns,
                        Categorie: categorie,
                        Punctaj: punctaj
                    };
                    db.push(q);
                }
                
                if(db.length > 0) {
                    document.getElementById('loadStatus').innerText = `Gata! ${db.length} întrebări valide încărcate.`;
                    document.getElementById('loadStatus').style.color = "green";
                    
                    const startBtn = document.getElementById('startBtn');
                    startBtn.disabled = false;
                    startBtn.style.background = "var(--green)";
                    startBtn.style.cursor = "pointer";

                    updateRecapButton();
                    loadHistory();
                } else {
                    document.getElementById('loadStatus').innerText = "Eroare la citirea întrebărilor din fișier.";
                    document.getElementById('loadStatus').style.color = "red";
                }
            }
        });

        // Incarcam separat baza de date pentru Modul de Studiu
        Papa.parse("studiu.csv?v=" + new Date().getTime(), {
            download: true,
            header: true,
            skipEmptyLines: true,
            delimiter: ";",
            complete: function(r) {
                r.data.forEach(row => {
                    if(!row.Echipament) return; // ignora randurile goale
                    if(!studyData[row.Echipament]) {
                        studyData[row.Echipament] = { Intrebare: [], Defect: [] };
                    }
                    if(row.Tip && studyData[row.Echipament][row.Tip]) {
                        studyData[row.Echipament][row.Tip].push({
                            title: row.Titlu,
                            content: row.Continut
                        });
                    }
                });
                
                // Afisam butonul de studiu doar daca s-au gasit date
                if(Object.keys(studyData).length > 0) {
                    document.getElementById('studyBtn').style.display = "block";
                }
            }
        });
    };

    function updateRecapButton() {
        const recapBtn = document.getElementById('recapBtn');
        const existingWrongQs = db.filter(q => wrongIDs.includes(q.cleanId));
        
        if(existingWrongQs.length > 0) {
            recapBtn.style.display = "block";
            recapBtn.innerText = `🔄 RECAPITULARE (${existingWrongQs.length})`;
        } else {
            recapBtn.style.display = "none";
        }
    }

    function initExam() {
        isRecapMode = false;
        
        for(let q of db) {
            if(!q.cleanCat) {
                let catVal = q.Categorie ? String(q.Categorie).toUpperCase() : "";
                q.cleanCat = catVal.normalize("NFD").replace(/[\u0300-\u036f]/g, "");
            }
        }

        function getCat(keyword) {
            return db.filter(q => q.cleanCat.includes(keyword)).sort(() => 0.5 - Math.random());
        }

        let pools = {
            "PSI": getCat("PSI"),
            "LEG": getCat("LEGISLATIE"),
            "MUN": getCat("MUNC"),
            "PRO": getCat("PROFESIONAL")
        };

        let examObj = {
            "PSI": pools.PSI.splice(0, 2),
            "LEG": pools.LEG.splice(0, 2),
            "MUN": pools.MUN.splice(0, 2),
            "PRO": pools.PRO.splice(0, 39)
        };

        let allSelected = [].concat(...Object.values(examObj));
        let remainingPool = [].concat(...Object.values(pools));

        while(allSelected.length < 45 && remainingPool.length > 0) {
            remainingPool.sort(() => 0.5 - Math.random());
            allSelected.push(remainingPool.pop());
        }

        let score = allSelected.reduce((sum, q) => sum + (parseInt(q.Punctaj) || 0), 0);
        let maxSwaps = 5000;
        let swapCount = 0;

        while(score !== 150 && swapCount < maxSwaps && remainingPool.length > 0) {
            let idxTest = Math.floor(Math.random() * allSelected.length);
            let qTest = allSelected[idxTest];
            let pctTest = parseInt(qTest.Punctaj) || 0;

            let posibileRezerve = remainingPool.filter(q => q.cleanCat === qTest.cleanCat);
            
            if (posibileRezerve.length > 0) {
                let idxRezerva = Math.floor(Math.random() * posibileRezerve.length);
                let qRezerva = posibileRezerve[idxRezerva];
                let pctRezerva = parseInt(qRezerva.Punctaj) || 0;

                let castigNet = pctRezerva - pctTest;

                if (Math.abs(150 - (score + castigNet)) < Math.abs(150 - score)) {
                    allSelected[idxTest] = qRezerva; 
                    
                    let idxInRemaining = remainingPool.indexOf(qRezerva);
                    remainingPool[idxInRemaining] = qTest; 
                    
                    score += castigNet; 
                }
            }
            swapCount++;
        }

        exam = allSelected;
        exam.sort((a, b) => a.cleanId - b.cleanId);
        maxExamScore = score; 

        startGameUI();
    }

    function initRecap() {
        isRecapMode = true;
        let validQs = db.filter(q => wrongIDs.includes(q.cleanId)).sort(() => 0.5 - Math.random());
        exam = validQs.slice(0, 45);
        startGameUI();
    }

    function startGameUI() {
        document.getElementById('startScreen').style.display = 'none';
        buildNav();
        render();
    }

    function buildNav() {
        const grid = document.getElementById('navGrid');
        grid.innerHTML = exam.map((_, i) => `<div class="nav-item" id="nav-${i}" onclick="jump(${i})">${i+1}</div>`).join('');
    }

    function render() {
        const q = exam[currentIdx];
        if(!q) return;

        let pct = parseInt(q.Punctaj) || 0;
        
        document.getElementById('qMeta').innerText = `ID: ${q.ID} | ${q.Categorie} (${pct}p)`;
        document.getElementById('qText').innerText = q.Intrebare;
        document.getElementById('scoreDisplay').innerText = isRecapMode ? "MOD RECAPITULARE" : `SCOR: ${currentScore} / 150`;
        
        const area = document.getElementById('optionsArea');
        area.innerHTML = "";
        
        ['A', 'B', 'C', 'D', 'E'].forEach(l => {
            let val = q[`Var_${l}`];
            if(val && val.toString().trim() !== "" && val.toString().trim() !== "-") {
                area.innerHTML += `
                    <div class="opt-btn ${ (answers[currentIdx] || "").includes(l) ? 'selected' : '' }" 
                         onclick="toggleOpt(this, '${l}')" id="opt-${l}">
                         <strong>${l}.</strong> &nbsp; ${val}
                    </div>`;
            }
        });

        updateNavStyles();
        isPaused = false;
        resetReportBtn(); 

        const btn = document.getElementById('mainBtn');
        btn.disabled = false;
        
        if(results[currentIdx]) {
            btn.innerText = (currentIdx === exam.length - 1 ? "FINALIZEAZĂ" : "URMĂTOAREA");
            btn.style.background = "var(--blue)";
            showInstantFeedback(q.Raspuns_Corect.toUpperCase().replace(/[^A-E]/g, ''), answers[currentIdx] || "");
        } else {
            btn.innerText = "VERIFICĂ";
            btn.style.background = "var(--green)";
        }
    }

    function updateNavStyles() {
        document.querySelectorAll('.nav-item').forEach((el, i) => {
            el.classList.remove('active', 'correct', 'wrong');
            if(i === currentIdx) el.classList.add('active');
            if(results[i] === "correct") el.classList.add('correct');
            if(results[i] === "wrong") el.classList.add('wrong');
        });
    }

    function toggleOpt(el, l) {
        if(results[currentIdx] || isPaused) return; 
        el.classList.toggle('selected');
        let current = answers[currentIdx] || "";
        answers[currentIdx] = current.includes(l) ? current.replace(l, '') : (current + l).split('').sort().join('');
    }

    function handleAction() {
        if(isPaused) return;
        const btn = document.getElementById('mainBtn');
        const q = exam[currentIdx];

        if(btn.innerText === "VERIFICĂ") {
            const correct = q.Raspuns_Corect.toUpperCase().replace(/[^A-E]/g, ''); 
            const user = answers[currentIdx] || "";
            let punctaj = parseInt(q.Punctaj) || 0;

            if(user === correct) {
                results[currentIdx] = "correct";
                currentScore += punctaj;
                
                if(wrongIDs.includes(q.cleanId)) {
                    wrongIDs = wrongIDs.filter(id => id !== q.cleanId);
                    localStorage.setItem('pram_wrongIDs', JSON.stringify(wrongIDs));
                }

                showInstantFeedback(correct, user);
                updateNavStyles();
                
                if (currentIdx < exam.length - 1) {
                    isPaused = true;
                    btn.innerText = "CORECT! SE TRECE LA URMĂTOAREA...";
                    btn.style.background = "var(--orange)";
                    setTimeout(() => { move(1); }, 1500);
                } else {
                    btn.innerText = "FINALIZEAZĂ";
                    btn.style.background = "var(--blue)";
                }
            } else {
                results[currentIdx] = "wrong";
                
                if(!wrongIDs.includes(q.cleanId)) {
                    wrongIDs.push(q.cleanId);
                    localStorage.setItem('pram_wrongIDs', JSON.stringify(wrongIDs));
                }

                showInstantFeedback(correct, user);
                updateNavStyles();
                btn.innerText = (currentIdx === exam.length - 1 ? "FINALIZEAZĂ" : "URMĂTOAREA");
                btn.style.background = "var(--blue)";
            }
        } else {
            if(currentIdx === exam.length - 1) finish(); else move(1);
        }
    }

    function showInstantFeedback(correct, user) {
        ['A','B','C','D','E'].forEach(l => {
            const el = document.getElementById('opt-' + l);
            if(el) {
                if(correct.includes(l)) {
                    el.style.background = "#d4edda"; 
                    el.style.borderColor = "var(--green)";
                }
                if(user.includes(l) && !correct.includes(l)) {
                    el.style.background = "#f8d7da";
                    el.style.borderColor = "var(--red)";
                }
            }
        });
    }

    function jump(i) { if(isPaused) return; currentIdx = i; render(); }
    function move(d) { currentIdx += d; if(currentIdx<0)currentIdx=0; if(currentIdx > exam.length - 1) currentIdx = exam.length - 1; render(); }

    function finish() {
        if(!isRecapMode) saveHistory(currentScore);
        
        document.getElementById('resultScreen').style.display = 'flex';
        
        if(isRecapMode) {
            document.getElementById('verdictText').innerText = "RECAPITULARE FINALIZATĂ";
            let remaining = exam.filter(q => wrongIDs.includes(q.cleanId)).length;
            document.getElementById('finalScoreText').innerText = remaining > 0 ? `Mai ai ${remaining} de învățat!` : "Ai învățat tot! 🎉";
            document.getElementById('finalScoreText').style.fontSize = "30px";
        } else {
            document.getElementById('finalScoreText').innerText = currentScore + " / 150";
            document.getElementById('verdictText').innerText = currentScore >= 120 ? "ADMIS 🎖️" : "RESPINS ❌";
        }
    }

    function saveHistory(s) {
        let h = JSON.parse(localStorage.getItem('pram_h') || "[]");
        h.unshift({ scor: s, data: new Date().toLocaleDateString() });
        localStorage.setItem('pram_h', JSON.stringify(h.slice(0, 60))); 
    }

    function loadHistory() {
        let h = JSON.parse(localStorage.getItem('pram_h') || "[]");
        document.getElementById('historyList').innerHTML = h.map((x, i) => 
            `<div class="history-item">
                <span>Test #${h.length - i}</span> 
                <span>${x.scor}p</span>
            </div>`).join('');
    }

        async function trimiteRaport() {
        const q = exam[currentIdx];
        if(!q) return;

        const btn = document.getElementById('reportBtn');
        btn.innerText = "⏳ Se trimite...";
        btn.disabled = true;

        try {
            await fetch("https://api.web3forms.com/submit", {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                body: JSON.stringify({
                    access_key: "1aaf654f-a318-4feb-9183-ab3649c6da3e",
                    subject: "⚠️ Raportare eroare grila PRAM",
                    ID_Intrebare: q.ID,
                    Mesaj: "Utilizatorul a marcat aceasta intrebare ca fiind gresita in baza de date."
                })
            });
            btn.innerText = "✔️ Trimis!";
        } catch(e) {
            btn.innerText = "Eroare. Reîncearcă!";
            btn.disabled = false;
        }
    }


    function resetReportBtn() {
        const btn = document.getElementById('reportBtn');
        btn.innerText = "🚩 RAPORTARE";
        btn.disabled = false;
    }

    // --- FUNCTII PENTRU MODUL STUDIU ---
    function openStudy() {
        document.getElementById('startScreen').style.display = 'none';
        document.getElementById('studyScreen').style.display = 'flex';
        renderStudyAll();
    }

    function closeStudy() {
        document.getElementById('studyScreen').style.display = 'none';
        document.getElementById('startScreen').style.display = 'flex';
    }

    function renderStudyAll() {
        const contentArea = document.getElementById('studyContent');
        let html = ``;

        // 1. Generam Bara de navigare lipicioasa (Sticky) sus
        html += `<div class="study-nav-scroll">`;
        Object.keys(studyData).forEach(eq => {
            html += `<a href="#sec-${eq}" class="nav-anchor">Mergi la ${eq}</a>`;
        });
        html += `</div>`;

        // 2. Generam continutul, echipament sub echipament
        Object.keys(studyData).forEach(eq => {
            html += `<div id="sec-${eq}" class="eq-section">`;
            html += `<h2 class="eq-title">⚙️ Echipament: ${eq}</h2>`;

            // Intrebarile pentru echipamentul curent
            let qna = studyData[eq].Intrebare;
            if(qna && qna.length > 0) {
                html += `<h3 style="color: var(--blue)">❓ Întrebări și Răspunsuri</h3><div class="study-grid">`;
                qna.forEach(item => {
                    html += `<div class="study-card"><strong style="font-size:15px;">Î: ${item.title}</strong><hr><span style="color:var(--dark)"><strong>R:</strong> ${item.content}</span></div>`;
                });
                html += `</div>`;
            }

            // Defectele pentru echipamentul curent
            let defects = studyData[eq].Defect;
            if(defects && defects.length > 0) {
                html += `<h3 style="color: var(--red)">⚠️ Defecte și Efecte</h3><div class="study-grid">`;
                defects.forEach(item => {
                    html += `<div class="study-card defect-card"><strong style="color:var(--red)">${item.title}</strong><hr><span style="color:var(--dark)"><strong>Efect:</strong> ${item.content}</span></div>`;
                });
                html += `</div>`;
            }
            html += `</div>`; // Inchidem sectiunea echipamentului
        });

        contentArea.innerHTML = html;
    }
</script>

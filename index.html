<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Examen PRAM - Perfect Edition & Recapitulare</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root { --dark: #2c3e50; --blue: #3498db; --green: #27ae60; --red: #e74c3c; --orange: #f39c12; --gray: #ecf0f1; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; padding: 5px; display: flex; flex-direction: column; align-items: center; }
        
        .nav-container { width: 100%; max-width: 800px; background: var(--dark); padding: 5px; border-radius: 8px; margin-bottom: 10px; }
        .nav-grid { display: grid; grid-template-columns: repeat(15, 1fr); gap: 3px; }
        .nav-item { padding: 4px 0; text-align: center; background: rgba(255,255,255,0.2); color: white; border-radius: 3px; cursor: pointer; font-size: 10px; font-weight: bold; }
        .nav-item.active { background: var(--orange) !important; outline: 1px solid white; }
        .nav-item.correct { background: var(--green) !important; }
        .nav-item.wrong { background: var(--red) !important; }

        .quiz-card { background: white; width: 100%; max-width: 800px; padding: 15px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); box-sizing: border-box; }
        .stats-header { display: flex; justify-content: space-between; font-weight: bold; font-size: 13px; margin-bottom: 10px; color: var(--dark); border-bottom: 1px solid #eee; padding-bottom: 8px; align-items: center; }
        
        .q-text { font-size: 17px; font-weight: 600; margin-bottom: 15px; line-height: 1.3; }
        .options-container { display: flex; flex-direction: column; gap: 8px; margin-bottom: 15px; }
        .opt-btn { display: flex; align-items: center; padding: 10px; border: 1px solid #ddd; border-radius: 6px; cursor: pointer; background: white; font-size: 14px; transition: 0.2s; }
        .opt-btn.selected { border-color: var(--blue); background: #ebf5fb; }
        
        .controls { display: flex; gap: 8px; }
        button { flex: 1; padding: 12px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 15px; color: white; transition: 0.2s; }
        .btn-prev { background: #95a5a6; }
        .btn-action { background: var(--green); }

        /* Butoanele de pe ecranul de start */
        .start-btn-group { display: flex; flex-direction: column; gap: 10px; width: 100%; max-width: 300px; margin-top: 15px; }
        .btn-recap { background: var(--orange); display: none; }

        /* Stilul butonului de raportare */
        .report-btn { background: none; border: 1px solid var(--red); color: var(--red); padding: 5px 10px; border-radius: 4px; font-size: 11px; cursor: pointer; transition: 0.2s; font-weight: bold; display: flex; align-items: center; gap: 4px;}
        .report-btn:hover { background: var(--red); color: white; }
        .report-btn:disabled { border-color: var(--green); color: var(--green); background: #ebf5eb; cursor: default; }

        #startScreen, #resultScreen { position: fixed; inset: 0; background: white; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; overflow-y: auto;}
        .history-panel { width: 100%; max-width: 800px; margin-top: 15px; background: white; padding: 10px; border-radius: 8px; font-size: 13px; }
        #errorLog { color: red; font-size: 14px; margin-bottom: 15px; font-weight: bold; }
    </style>
</head>
<body>

<div id="startScreen">
    <h1>📝 Examen PRAM</h1>
    <p>45 Întrebări | 150 Puncte</p>
    <div id="loadStatus" style="margin-bottom:10px; color: var(--orange); font-weight: bold;">Se descarcă baza de date...</div>
    <div id="errorLog"></div>
    
    <div class="start-btn-group">
        <button id="startBtn" disabled onclick="initExam()" style="background:#ccc; padding: 15px; font-size:16px; border-radius: 10px; cursor:not-allowed;">START EXAMEN</button>
        <button id="recapBtn" class="btn-recap" onclick="initRecap()" style="padding: 15px; font-size:14px; border-radius: 10px;">🔄 RECAPITULARE</button>
    </div>
</div>

<div class="nav-container">
    <div class="nav-grid" id="navGrid"></div>
</div>

<div class="quiz-card" id="quizCard">
    <div class="stats-header">
        <span id="scoreDisplay">SCOR: 0</span>
        <div style="display: flex; gap: 10px; align-items: center;">
            <span id="qMeta" style="color:var(--blue)">-</span>
            <button id="reportBtn" class="report-btn" onclick="trimiteRaport()">🚩 EROARE</button>
        </div>
    </div>
    <div id="qText" class="q-text">Alege un ID sau pornește examenul...</div>
    <div class="options-container" id="optionsArea"></div>
    
    <div class="controls">
        <button class="btn-prev" onclick="move(-1)">ÎNAPOI</button>
        <button class="btn-action" id="mainBtn" onclick="handleAction()">VERIFICĂ</button>
    </div>
</div>

<div class="history-panel">
    <strong>📜 Istoric Scoruri:</strong>
    <div id="historyList"></div>
</div>

<div id="resultScreen" style="display:none">
    <h1 id="verdictText">REZULTAT</h1>
    <div style="font-size: 50px; font-weight: bold; color: var(--blue);" id="finalScoreText">0</div>
    <button onclick="location.reload()" style="background:var(--dark); padding: 10px 30px;">REIA TESTUL</button>
</div>

<script>
    let db = [];
    let exam = [], currentIdx = 0, currentScore = 0;
    let answers = {}, results = {}, isPaused = false; 
    let wrongIDs = JSON.parse(localStorage.getItem('pram_wrongIDs') || "[]"); // Salvăm ID-urile greșite
    let isRecapMode = false;

    // Încărcarea și procesarea fișierului
    window.onload = function() {
        Papa.parse("baza_date.csv?v=" + new Date().getTime(), {
            download: true,
            header: false,
            skipEmptyLines: true,
            delimiter: ";", 
            complete: function(r) {
                let rows = r.data;
                for(let i=1; i < rows.length; i++) {
                    let parts = rows[i].filter(p => p !== null && p !== undefined && p.trim() !== '');
                    if(parts.length < 5) continue; 
                    
                    let punctaj = parts[parts.length - 1];
                    let categorie = parts[parts.length - 2];
                    let raspuns = parts[parts.length - 3];
                    let id = parts[0];
                    let intrebare = parts[1];
                    let options = parts.slice(2, parts.length - 3);
                    
                    let q = {
                        ID: id,
                        cleanId: parseInt(id.replace(/\D/g, '')) || 0,
                        Intrebare: intrebare,
                        Var_A: options[0] || "-",
                        Var_B: options[1] || "-",
                        Var_C: options[2] || "-",
                        Var_D: options[3] || "-",
                        Var_E: options.slice(4).join("; ") || "-",
                        Raspuns_Corect: raspuns,
                        Categorie: categorie,
                        Punctaj: punctaj
                    };
                    db.push(q);
                }
                
                if(db.length > 0) {
                    document.getElementById('loadStatus').innerText = `Gata! ${db.length} întrebări valide încărcate.`;
                    document.getElementById('loadStatus').style.color = "green";
                    
                    const startBtn = document.getElementById('startBtn');
                    startBtn.disabled = false;
                    startBtn.style.background = "var(--green)";
                    startBtn.style.cursor = "pointer";

                    updateRecapButton();
                    loadHistory();
                } else {
                    document.getElementById('loadStatus').innerText = "Eroare la citirea întrebărilor din fișier.";
                    document.getElementById('loadStatus').style.color = "red";
                }
            }
        });
    };

    function updateRecapButton() {
        const recapBtn = document.getElementById('recapBtn');
        // Ne asigurăm că ID-urile greșite salvate încă există în baza de date
        const existingWrongQs = db.filter(q => wrongIDs.includes(q.cleanId));
        
        if(existingWrongQs.length > 0) {
            recapBtn.style.display = "block";
            recapBtn.innerText = `🔄 RECAPITULARE (${existingWrongQs.length})`;
        } else {
            recapBtn.style.display = "none";
        }
    }

    function initExam() {
        isRecapMode = false;
        let validQs = [...db].sort(() => 0.5 - Math.random());
        let pool = [];

        const extractCat = (keyword, count) => {
            let extracted = [];
            for (let i = validQs.length - 1; i >= 0; i--) {
                let catVal = validQs[i].Categorie ? String(validQs[i].Categorie).toUpperCase() : "";
                catVal = catVal.normalize("NFD").replace(/[\u0300-\u036f]/g, "");
                if (catVal.includes(keyword)) {
                    extracted.push(validQs.splice(i, 1)[0]);
                }
                if (extracted.length === count) break;
            }
            return extracted;
        };

        pool.push(...extractCat("PSI", 2));
        pool.push(...extractCat("LEGISLATIE", 2));
        pool.push(...extractCat("MUNC", 2)); 
        pool.push(...extractCat("PROFESIONAL", 39));

        while (pool.length < 45 && validQs.length > 0) {
            pool.push(validQs.pop());
        }

        exam = pool.slice(0, 45);
        exam.sort((a, b) => a.cleanId - b.cleanId);

        startGameUI();
    }

    function initRecap() {
        isRecapMode = true;
        // Luăm doar întrebările care sunt în lista de greșeli, amestecate
        let validQs = db.filter(q => wrongIDs.includes(q.cleanId)).sort(() => 0.5 - Math.random());
        
        // În modul recapitulare, îi dăm maxim 45 de greșeli o dată ca să nu fie copleșitor
        exam = validQs.slice(0, 45);
        
        startGameUI();
    }

    function startGameUI() {
        document.getElementById('startScreen').style.display = 'none';
        buildNav();
        render();
    }

    function buildNav() {
        const grid = document.getElementById('navGrid');
        grid.innerHTML = exam.map((_, i) => `<div class="nav-item" id="nav-${i}" onclick="jump(${i})">${i+1}</div>`).join('');
    }

    function render() {
        const q = exam[currentIdx];
        if(!q) return;

        let pct = parseInt(q.Punctaj) || 0;
        let totalPct = isRecapMode ? "?" : "150";
        
        document.getElementById('qMeta').innerText = `ID: ${q.ID} | ${q.Categorie} (${pct}p)`;
        document.getElementById('qText').innerText = q.Intrebare;
        document.getElementById('scoreDisplay').innerText = isRecapMode ? "MOD RECAPITULARE" : `SCOR: ${currentScore} / 150`;
        
        const area = document.getElementById('optionsArea');
        area.innerHTML = "";
        
        ['A', 'B', 'C', 'D', 'E'].forEach(l => {
            let val = q[`Var_${l}`];
            if(val && val.toString().trim() !== "" && val.toString().trim() !== "-") {
                area.innerHTML += `
                    <div class="opt-btn ${ (answers[currentIdx] || "").includes(l) ? 'selected' : '' }" 
                         onclick="toggleOpt(this, '${l}')" id="opt-${l}">
                         <strong>${l}.</strong> &nbsp; ${val}
                    </div>`;
            }
        });

        updateNavStyles();
        isPaused = false;
        resetReportBtn(); 

        const btn = document.getElementById('mainBtn');
        btn.disabled = false;
        
        if(results[currentIdx]) {
            btn.innerText = (currentIdx === exam.length - 1 ? "FINALIZEAZĂ" : "URMĂTOAREA");
            btn.style.background = "var(--blue)";
            showInstantFeedback(q.Raspuns_Corect.toUpperCase().replace(/[^A-E]/g, ''), answers[currentIdx] || "");
        } else {
            btn.innerText = "VERIFICĂ";
            btn.style.background = "var(--green)";
        }
    }

    function updateNavStyles() {
        document.querySelectorAll('.nav-item').forEach((el, i) => {
            el.classList.remove('active', 'correct', 'wrong');
            if(i === currentIdx) el.classList.add('active');
            if(results[i] === "correct") el.classList.add('correct');
            if(results[i] === "wrong") el.classList.add('wrong');
        });
    }

    function toggleOpt(el, l) {
        if(results[currentIdx] || isPaused) return; 
        el.classList.toggle('selected');
        let current = answers[currentIdx] || "";
        answers[currentIdx] = current.includes(l) ? current.replace(l, '') : (current + l).split('').sort().join('');
    }

    function handleAction() {
        if(isPaused) return;
        const btn = document.getElementById('mainBtn');
        const q = exam[currentIdx];

        if(btn.innerText === "VERIFICĂ") {
            const correct = q.Raspuns_Corect.toUpperCase().replace(/[^A-E]/g, ''); 
            const user = answers[currentIdx] || "";
            let punctaj = parseInt(q.Punctaj) || 0;

            if(user === correct) {
                results[currentIdx] = "correct";
                currentScore += punctaj;
                
                // Dacă a răspuns corect, o ștergem din lista de greșeli (dacă era acolo)
                if(wrongIDs.includes(q.cleanId)) {
                    wrongIDs = wrongIDs.filter(id => id !== q.cleanId);
                    localStorage.setItem('pram_wrongIDs', JSON.stringify(wrongIDs));
                }

                showInstantFeedback(correct, user);
                updateNavStyles();
                
                if (currentIdx < exam.length - 1) {
                    isPaused = true;
                    btn.innerText = "CORECT! SE TRECE LA URMĂTOAREA...";
                    btn.style.background = "var(--orange)";
                    setTimeout(() => { move(1); }, 1500); // 1.5 SECUNDE AUTO-NEXT
                } else {
                    btn.innerText = "FINALIZEAZĂ";
                    btn.style.background = "var(--blue)";
                }
            } else {
                results[currentIdx] = "wrong";
                
                // Dacă a răspuns greșit, salvăm ID-ul în lista de greșeli
                if(!wrongIDs.includes(q.cleanId)) {
                    wrongIDs.push(q.cleanId);
                    localStorage.setItem('pram_wrongIDs', JSON.stringify(wrongIDs));
                }

                showInstantFeedback(correct, user);
                updateNavStyles();
                btn.innerText = (currentIdx === exam.length - 1 ? "FINALIZEAZĂ" : "URMĂTOAREA");
                btn.style.background = "var(--blue)";
            }
        } else {
            if(currentIdx === exam.length - 1) finish(); else move(1);
        }
    }

    function showInstantFeedback(correct, user) {
        ['A','B','C','D','E'].forEach(l => {
            const el = document.getElementById('opt-' + l);
            if(el) {
                if(correct.includes(l)) {
                    el.style.background = "#d4edda"; 
                    el.style.borderColor = "var(--green)";
                }
                if(user.includes(l) && !correct.includes(l)) {
                    el.style.background = "#f8d7da";
                    el.style.borderColor = "var(--red)";
                }
            }
        });
    }

    function jump(i) { if(isPaused) return; currentIdx = i; render(); }
    function move(d) { currentIdx += d; if(currentIdx<0)currentIdx=0; if(currentIdx > exam.length - 1) currentIdx = exam.length - 1; render(); }

    function finish() {
        if(!isRecapMode) saveHistory(currentScore);
        
        document.getElementById('resultScreen').style.display = 'flex';
        
        if(isRecapMode) {
            document.getElementById('verdictText').innerText = "RECAPITULARE FINALIZATĂ";
            let remaining = exam.filter(q => wrongIDs.includes(q.cleanId)).length;
            document.getElementById('finalScoreText').innerText = remaining > 0 ? `Mai ai ${remaining} de învățat!` : "Ai învățat tot! 🎉";
            document.getElementById('finalScoreText').style.fontSize = "30px";
        } else {
            document.getElementById('finalScoreText').innerText = currentScore + " / 150";
            document.getElementById('verdictText').innerText = currentScore >= 120 ? "ADMIS 🎖️" : "RESPINS ❌";
        }
    }

    function saveHistory(s) {
        let h = JSON.parse(localStorage.getItem('pram_h') || "[]");
        h.unshift({ scor: s, data: new Date().toLocaleDateString() });
        localStorage.setItem('pram_h', JSON.stringify(h.slice(0, 10)));
    }

    function loadHistory() {
        let h = JSON.parse(localStorage.getItem('pram_h') || "[]");
        document.getElementById('historyList').innerHTML = h.map((x, i) => 
            `<div class="history-item"><span>Test #${h.length - i}</span> <b>${x.scor}p</b></div>`).join('');
    }

    // ==========================================
    // FUNCTIA DE RAPORTARE SILENTIOASA FORMSPREE
    // ==========================================
    async function trimiteRaport() {
        const q = exam[currentIdx];
        if(!q) return;

        const btn = document.getElementById('reportBtn');
        btn.innerText = "⏳ Se trimite...";
        btn.disabled = true;

        const FORMSPREE_URL = "https://formspree.io/f/xjgpjzqg"; 

        try {
            await fetch(FORMSPREE_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                body: JSON.stringify({
                    Subiect: "⚠️ Raportare eroare grila PRAM",
                    ID_Intrebare: q.ID,
                    Mesaj: "Utilizatorul a marcat aceasta intrebare ca fiind gresita in baza de date."
                })
            });
            btn.innerText = "✔️ Trimis!";
        } catch(e) {
            btn.innerText = "Eroare. Reîncearcă!";
            btn.disabled = false;
        }
    }

    function resetReportBtn() {
        const btn = document.getElementById('reportBtn');
        btn.innerText = "🚩 EROARE";
        btn.disabled = false;
    }
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Examen PRAM - Auto-Next (Sincronizare 2 Baze de Date)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root { --dark: #2c3e50; --blue: #3498db; --green: #27ae60; --red: #e74c3c; --orange: #f39c12; --gray: #ecf0f1; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; padding: 5px; display: flex; flex-direction: column; align-items: center; }
        
        .nav-container { width: 100%; max-width: 800px; background: var(--dark); padding: 5px; border-radius: 8px; margin-bottom: 10px; }
        .nav-grid { display: grid; grid-template-columns: repeat(15, 1fr); gap: 3px; }
        .nav-item { padding: 4px 0; text-align: center; background: rgba(255,255,255,0.2); color: white; border-radius: 3px; cursor: pointer; font-size: 10px; font-weight: bold; }
        .nav-item.active { background: var(--orange) !important; outline: 1px solid white; }
        .nav-item.correct { background: var(--green) !important; }
        .nav-item.wrong { background: var(--red) !important; }

        .quiz-card { background: white; width: 100%; max-width: 800px; padding: 15px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); box-sizing: border-box; }
        .stats-header { display: flex; justify-content: space-between; font-weight: bold; font-size: 13px; margin-bottom: 10px; color: var(--dark); border-bottom: 1px solid #eee; padding-bottom: 8px; }
        
        .q-text { font-size: 17px; font-weight: 600; margin-bottom: 15px; line-height: 1.3; }
        .options-container { display: flex; flex-direction: column; gap: 8px; margin-bottom: 15px; }
        .opt-btn { display: flex; align-items: center; padding: 10px; border: 1px solid #ddd; border-radius: 6px; cursor: pointer; background: white; font-size: 14px; transition: 0.2s; }
        .opt-btn.selected { border-color: var(--blue); background: #ebf5fb; }
        
        .controls { display: flex; gap: 8px; }
        button { flex: 1; padding: 12px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 15px; color: white; }
        .btn-prev { background: #95a5a6; }
        .btn-action { background: var(--green); }

        #startScreen, #resultScreen { position: fixed; inset: 0; background: white; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; }
        .history-panel { width: 100%; max-width: 800px; margin-top: 15px; background: white; padding: 10px; border-radius: 8px; font-size: 13px; }
    </style>
</head>
<body>

<div id="startScreen">
    <h1>📝 Examen PRAM</h1>
    <p>45 Întrebări | 150 Puncte</p>
    <div id="loadStatus" style="margin-bottom:20px; color: red; font-weight: bold;">Se descarcă bazele de date...</div>
    <button id="startBtn" disabled onclick="initExam()" style="background:#ccc; padding: 15px 40px; font-size:18px; border-radius: 10px; cursor:not-allowed;">START EXAMEN</button>
</div>

<div class="nav-container">
    <div class="nav-grid" id="navGrid"></div>
</div>

<div class="quiz-card" id="quizCard">
    <div class="stats-header">
        <span id="scoreDisplay">SCOR: 0 / 150</span>
        <span id="qMeta" style="color:var(--blue)">-</span>
    </div>
    <div id="qText" class="q-text">Alege un ID sau pornește examenul...</div>
    <div class="options-container" id="optionsArea"></div>
    
    <div class="controls">
        <button class="btn-prev" onclick="move(-1)">ÎNAPOI</button>
        <button class="btn-action" id="mainBtn" onclick="handleAction()">VERIFICĂ</button>
    </div>
</div>

<div class="history-panel">
    <strong>📜 Istoric Scoruri:</strong>
    <div id="historyList"></div>
</div>

<div id="resultScreen" style="display:none">
    <h1 id="verdictText">REZULTAT</h1>
    <div style="font-size: 50px; font-weight: bold; color: var(--blue);" id="finalScoreText">0</div>
    <button onclick="location.reload()" style="background:var(--dark); padding: 10px 30px;">REIA TESTUL</button>
</div>

<script>
    let db = [], answersDb = {};
    let exam = [], currentIdx = 0, currentScore = 0;
    let answers = {}, results = {}, isPaused = false; 
    let filesLoaded = 0;

    // FUNCȚIE PENTRU VERIFICAREA ÎNCĂRCĂRII
    function checkReady() {
        filesLoaded++;
        if (filesLoaded === 2) {
            try {
                // Mapăm răspunsurile
                db.forEach(q => {
                    let id = String(q.ID).trim();
                    if (answersDb[id]) {
                        q.Raspuns_Corect = answersDb[id];
                    }
                });

                let validQuestions = db.filter(q => q.Raspuns_Corect).length;
                
                if (validQuestions === 0) {
                    document.getElementById('loadStatus').innerText = "Eroare: Nicio întrebare nu are răspuns mapat! Verifică dacă ID-urile din cele două CSV-uri se potrivesc.";
                    return;
                }

                document.getElementById('loadStatus').innerText = `Gata! ${validQuestions} întrebări sincronizate perfect.`;
                document.getElementById('loadStatus').style.color = "green";
                const startBtn = document.getElementById('startBtn');
                startBtn.disabled = false;
                startBtn.style.background = "var(--green)";
                startBtn.style.cursor = "pointer";
                loadHistory();
            } catch(e) {
                document.getElementById('loadStatus').innerText = "Eroare la sincronizarea datelor: " + e.message;
            }
        }
    }

    // ÎNCĂRCARE BAZA DE DATE (ÎNTREBĂRI)
    Papa.parse("baza_date.csv", {
        download: true,
        header: true,
        skipEmptyLines: true,
        complete: function(r) {
            db = r.data;
            checkReady();
        },
        error: function(err) {
            document.getElementById('loadStatus').innerText = "Eroare la citirea baza_date.csv! (Eroare: " + err.message + ")";
        }
    });

    // ÎNCĂRCARE BAZA DE DATE (RĂSPUNSURI)
    Papa.parse("raspunsuri.csv", {
        download: true,
        header: true,
        skipEmptyLines: true,
        complete: function(r) {
            try {
                r.data.forEach(row => {
                    let keys = Object.keys(row);
                    let idKey = keys.find(k => k.trim().toUpperCase() === "ID");
                    let respKey = keys.find(k => k.trim().toUpperCase() === "RASPUNS_CORECT");

                    if (idKey && respKey && row[idKey] && row[respKey]) {
                        answersDb[String(row[idKey]).trim()] = String(row[respKey]).trim();
                    }
                });
                checkReady();
            } catch(e) {
                document.getElementById('loadStatus').innerText = "Eroare JS la procesarea raspunsuri.csv: " + e.message;
            }
        },
        error: function(err) {
            document.getElementById('loadStatus').innerText = "Eroare la citirea raspunsuri.csv! (Eroare: " + err.message + ")";
        }
    });

    function initExam() {
        const getCat = (c) => db.filter(q => q.Categorie && q.Categorie.toString().toUpperCase().includes(c) && q.Raspuns_Corect).sort(() => 0.5 - Math.random());
        
        let pool = [
            ...getCat("PSI").slice(0, 2),
            ...getCat("LEGISLATIE").slice(0, 2),
            ...getCat("MUNCII").slice(0, 2),
            ...getCat("PROFESIONAL").slice(0, 39)
        ];

        exam = pool.sort((a, b) => parseInt(a.ID) - parseInt(b.ID));
        
        if (exam.length === 0) {
            alert("Eroare la selectarea întrebărilor. Posibil să nu ai întrebări din categoriile selectate (PSI, LEGISLATIE, MUNCII, PROFESIONAL) care să aibă și răspuns mapat!");
            return;
        }

        document.getElementById('startScreen').style.display = 'none';
        buildNav();
        render();
    }

    function buildNav() {
        const grid = document.getElementById('navGrid');
        grid.innerHTML = exam.map((_, i) => `<div class="nav-item" id="nav-${i}" onclick="jump(${i})">${i+1}</div>`).join('');
    }

    function render() {
        const q = exam[currentIdx];
        if(!q) return;
        
        document.getElementById('qMeta').innerText = `ID: ${q.ID} | ${q.Categorie} (${q.Punctaj}p)`;
        document.getElementById('qText').innerText = q.Intrebare;
        document.getElementById('scoreDisplay').innerText = `SCOR: ${currentScore} / 150`;
        
        const area = document.getElementById('optionsArea');
        area.innerHTML = "";
        ['A', 'B', 'C', 'D', 'E'].forEach(l => {
            const val = q['Var_' + l] || q['Var_' + l.toLowerCase()]; 
            if(val && val.toString().trim() !== "" && val.toString().trim() !== "-") {
                area.innerHTML += `
                    <div class="opt-btn ${ (answers[currentIdx] || "").includes(l) ? 'selected' : '' }" 
                         onclick="toggleOpt(this, '${l}')" id="opt-${l}">
                         <strong>${l}.</strong> &nbsp; ${val}
                    </div>`;
            }
        });

        updateNavStyles();
        isPaused = false;

        const btn = document.getElementById('mainBtn');
        btn.disabled = false;
        if(results[currentIdx]) {
            btn.innerText = (currentIdx === 44 ? "FINALIZEAZĂ" : "URMĂTOAREA");
            btn.style.background = "var(--blue)";
            showInstantFeedback(q.Raspuns_Corect.toString().toUpperCase().replace(/\s/g, ''), answers[currentIdx] || "");
        } else {
            btn.innerText = "VERIFICĂ";
            btn.style.background = "var(--green)";
        }
    }

    function updateNavStyles() {
        document.querySelectorAll('.nav-item').forEach((el, i) => {
            el.classList.remove('active', 'correct', 'wrong');
            if(i === currentIdx) el.classList.add('active');
            if(results[i] === "correct") el.classList.add('correct');
            if(results[i] === "wrong") el.classList.add('wrong');
        });
    }

    function toggleOpt(el, l) {
        if(results[currentIdx] || isPaused) return; 
        el.classList.toggle('selected');
        let current = answers[currentIdx] || "";
        answers[currentIdx] = current.includes(l) ? current.replace(l, '') : (current + l).split('').sort().join('');
    }

    function handleAction() {
        if(isPaused) return;
        const btn = document.getElementById('mainBtn');
        const q = exam[currentIdx];

        if(btn.innerText === "VERIFICĂ") {
            const correct = q.Raspuns_Corect.toString().toUpperCase().replace(/[^A-E]/g, ''); // Elimină spații și virgule, reține doar A-E
            const user = answers[currentIdx] || "";
            
            if(user === correct) {
                results[currentIdx] = "correct";
                currentScore += parseInt(q.Punctaj || 0);
                showInstantFeedback(correct, user);
                updateNavStyles();
                
                if (currentIdx < 44) {
                    isPaused = true;
                    btn.innerText = "CORECT! SE TRECE LA URMĂTOAREA...";
                    btn.style.background = "var(--orange)";
                    setTimeout(() => { move(1); }, 2000);
                } else {
                    btn.innerText = "FINALIZEAZĂ";
                    btn.style.background = "var(--blue)";
                }
            } else {
                results[currentIdx] = "wrong";
                showInstantFeedback(correct, user);
                updateNavStyles();
                btn.innerText = (currentIdx === 44 ? "FINALIZEAZĂ" : "URMĂTOAREA");
                btn.style.background = "var(--blue)";
            }
        } else {
            if(currentIdx === 44) finish(); else move(1);
        }
    }

    function showInstantFeedback(correct, user) {
        ['A','B','C','D','E'].forEach(l => {
            const el = document.getElementById('opt-' + l);
            if(el) {
                if(correct.includes(l)) {
                    el.style.background = "#d4edda"; 
                    el.style.borderColor = "var(--green)";
                }
                if(user.includes(l) && !correct.includes(l)) {
                    el.style.background = "#f8d7da";
                    el.style.borderColor = "var(--red)";
                }
            }
        });
    }

    function jump(i) { if(isPaused) return; currentIdx = i; render(); }
    function move(d) { currentIdx += d; if(currentIdx<0)currentIdx=0; if(currentIdx>44)currentIdx=44; render(); }

    function finish() {
        saveHistory(currentScore);
        document.getElementById('resultScreen').style.display = 'flex';
        document.getElementById('finalScoreText').innerText = currentScore + " / 150";
        document.getElementById('verdictText').innerText = currentScore >= 120 ? "ADMIS 🎖️" : "RESPINS ❌";
    }

    function saveHistory(s) {
        let h = JSON.parse(localStorage.getItem('pram_h') || "[]");
        h.unshift({ scor: s, data: new Date().toLocaleDateString() });
        localStorage.setItem('pram_h', JSON.stringify(h.slice(0, 10)));
    }

    function loadHistory() {
        let h = JSON.parse(localStorage.getItem('pram_h') || "[]");
        document.getElementById('historyList').innerHTML = h.map((x, i) => 
            `<div class="history-item"><span>Test #${h.length - i}</span> <b>${x.scor}p</b></div>`).join('');
    }
</script>

</body>
</html>
